version: '3.8'
services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: farm
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
  web:
    build: .
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - db
    command: sh -c "sleep 15 && python 'farmer system/main.py'"
